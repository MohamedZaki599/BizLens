name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bizlens
          POSTGRES_PASSWORD: bizlens
          POSTGRES_DB: bizlens_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U bizlens"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://bizlens:bizlens@localhost:5432/bizlens_test
      DATABASE_SSL: "false"
      JWT_SECRET: ci-test-secret-minimum-16-chars
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run prisma:validate --workspace=@bizlens/database

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace=@bizlens/database

      - name: Run migrations
        working-directory: packages/database
        run: npx prisma migrate deploy

      - name: Build database package
        run: npm run build --workspace=@bizlens/database

      - name: Build server
        run: npm run build --workspace=@bizlens/server

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Test
        run: npm run test --workspaces --if-present

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.server
          push: false
          tags: bizlens-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
